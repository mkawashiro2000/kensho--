services:
  postgres:
    image: postgres:15-alpine
    container_name: kensho-postgres
    environment:
      POSTGRES_USER: kensho
      POSTGRES_PASSWORD: kensho
      POSTGRES_DB: kensho
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kensho"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kensho-redis
    ports:
      - "127.0.0.1:56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: kensho-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://kensho:kensho@postgres:5432/kensho
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.kensho.rule=Host(`kensho.local`)
      - traefik.http.routers.kensho.entrypoints=websecure
      - traefik.http.services.kensho.loadbalancer.server.port=8000
    restart: unless-stopped

volumes:
  pgdata:
